

services:
  # PostgreSQL database with pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: enterprise_ai_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enterprise_ai_network

  # FastAPI application
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: enterprise_ai_app
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-enterprise_ai}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_KEY=${API_KEY:-change_me_in_production}
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      - TOP_K_RESULTS=5
      - RATE_LIMIT_PER_MINUTE=60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../app:/app/app
      - ../scripts:/app/scripts
    networks:
      - enterprise_ai_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  enterprise_ai_network:
    driver: bridge
